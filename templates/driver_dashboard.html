<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Campus Ride - Driver Command</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #27ae60;
            --deep-green: #1e8449;
            --accent-green: #2ecc71;
            --bg-light: #f0f7f4;
            --text-dark: #1a202c;
            --glass-hollow: rgba(255, 255, 255, 0.7); 
            --danger: #ef4444;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            overflow-x: hidden; overflow-y: auto; 
            margin: 0;
        }

        #bgCanvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
            background: radial-gradient(circle at center, #ffffff 0%, #e8f5e9 100%);
        }

        .dashboard-container {
            width: 100%;
            max-width: 480px;
            padding: 50px 40px;
            background-color: var(--glass-hollow);
            backdrop-filter: blur(25px) saturate(160%);
            border-radius: 32px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.05), 0 20px 60px rgba(39, 174, 96, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.5);
            text-align: center;
            position: relative;
            z-index: 999;
        }

        .logo-box {
            width: 72px; height: 72px; margin: 0 auto 25px;
            background: linear-gradient(135deg, var(--accent-green), var(--primary-green));
            border-radius: 22px; display: flex; align-items: center; justify-content: center;
            font-size: 36px; color: #ffffff;
            box-shadow: 0 10px 25px rgba(39, 174, 96, 0.3);
            animation: pulse-glow 2s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0% { transform: scale(1); box-shadow: 0 10px 25px rgba(39, 174, 96, 0.3); }
            50% { transform: scale(1.05); box-shadow: 0 15px 35px rgba(39, 174, 96, 0.5); }
            100% { transform: scale(1); box-shadow: 0 10px 25px rgba(39, 174, 96, 0.3); }
        }

        h1 { font-size: 26px; font-weight: 800; color: var(--text-dark); margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: #4a5568; margin-bottom: 40px; font-weight: 600; opacity: 0.8; }

        .status-box {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(39, 174, 96, 0.1);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border-radius: 100px;
            font-weight: 800;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
        }

        .pulse-dot {
            width: 10px; height: 10px; background: var(--success); border-radius: 50%;
            position: relative;
        }
        .pulse-dot::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--success); border-radius: 50%; opacity: 0.4;
            animation: status-ping 1.5s infinite ease-out;
        }

        @keyframes status-ping {
            0% { transform: scale(1); opacity: 0.4; }
            100% { transform: scale(3.5); opacity: 0; }
        }

        .coords { font-family: 'Monaco', 'Consolas', monospace; font-size: 15px; font-weight: 700; color: var(--primary-green); letter-spacing: 0.5px; }
        .coord-label { font-size: 11px; font-weight: 800; color: #718096; text-transform: uppercase; margin-bottom: 5px; }

        .btn-stop {
            width: 100%; padding: 18px;
            background: #fff; border: 2px solid var(--danger);
            border-radius: 16px; color: var(--danger); font-weight: 800;
            cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px;
            transition: 0.3s;
        }
        .btn-stop:hover { background: var(--danger); color: #fff; }
        .btn-stop:active { transform: translateY(2px); }

        .footer-nav { margin-top: 35px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 25px; display: flex; justify-content: center; gap: 20px; }
        .footer-nav a { text-decoration: none; font-size: 13px; font-weight: 700; color: #718096; transition: 0.3s; }
        .footer-nav a:hover { color: var(--primary-green); }

        /* Modals and Widgets */
        .trip-complete-banner { position: absolute; top: 40px; left: 50%; transform: translateX(-50%) translateY(-20px); background: linear-gradient(135deg, #10b981, #059669); color: white; padding: 14px 24px; border-radius: 12px; font-weight: 800; display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 30px rgba(16,185,129,0.4); z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.4s cubic-bezier(0.175,0.885,0.32,1.275); }
        .trip-complete-banner.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

        .sos-fab { position: absolute; bottom: 30px; right: 20px; z-index: 1002; width: 64px; height: 64px; background: linear-gradient(135deg, #ef4444, #dc2626); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 28px; color: white; box-shadow: 0 6px 20px rgba(239,68,68,0.5); transition: 0.2s; animation: sos-fab-pulse 2.5s infinite ease-in-out; }
        .sos-fab:hover { transform: scale(1.05); }
        @keyframes sos-fab-pulse { 0%,100%{box-shadow:0 6px 20px rgba(239,68,68,0.5)} 50%{box-shadow:0 6px 35px rgba(239,68,68,0.8), 0 0 0 10px rgba(239,68,68,0.15)} }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 10000; display: none; align-items: center; justify-content: center; text-align: left; }
        .modal-overlay.show { display: flex; }
        .modal-card { background: white; border-radius: 24px; padding: 28px; width: 92%; max-width: 420px; box-shadow: 0 25px 50px rgba(0,0,0,0.25); animation: modal-in 0.3s ease; }
        @keyframes modal-in { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }
        .modal-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; color: var(--danger); text-align: center; }
        .modal-sub { font-size: 0.85rem; color: #64748b; margin-bottom: 20px; text-align: center; }
        .modal-field { margin-bottom: 15px; }
        .modal-field label { display: block; font-size: 0.8rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 8px; }
        .modal-field textarea, .modal-field select { width: 100%; padding: 12px 14px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 0.95rem; font-weight: 600; outline: none; font-family: 'Inter', sans-serif; resize: vertical; }
        .modal-field textarea:focus, .modal-field select:focus { border-color: var(--danger); box-shadow: 0 0 0 4px #fee2e2; }

        .recorder-box { border: 1.5px solid #e2e8f0; border-radius: 12px; padding: 16px; text-align: center; background: #fafafa; }
        .recorder-timer { font-size: 1.5rem; font-weight: 800; color: var(--danger); font-variant-numeric: tabular-nums; display: none; }
        .recorder-waveform { height: 30px; display: flex; align-items: center; justify-content: center; gap: 4px; margin: 10px 0; display: none; }
        .recorder-waveform span { display: inline-block; width: 4px; background: var(--danger); border-radius: 2px; animation: wave 0.8s infinite ease-in-out; }
        .recorder-waveform span:nth-child(1){animation-delay:0s;height:10px} .recorder-waveform span:nth-child(2){animation-delay:0.1s;height:18px} .recorder-waveform span:nth-child(3){animation-delay:0.2s;height:24px} .recorder-waveform span:nth-child(4){animation-delay:0.3s;height:16px} .recorder-waveform span:nth-child(5){animation-delay:0.4s;height:28px} .recorder-waveform span:nth-child(6){animation-delay:0.5s;height:12px} .recorder-waveform span:nth-child(7){animation-delay:0.6s;height:20px}
        @keyframes wave { 0%,100%{transform:scaleY(0.5)} 50%{transform:scaleY(1.5)} }
        .recorder-controls { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
        .rec-btn { padding: 10px 20px; border: none; border-radius: 10px; font-weight: 700; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .rec-btn-start { background: #fee2e2; color: var(--danger); }
        .rec-btn-start:hover { background: var(--danger); color: white; }
        .rec-btn-stop { background: #f3f4f6; color: #374151; display: none; }
        .rec-btn-stop.show { display: flex; }
        audio.preview { width: 100%; margin-top: 10px; border-radius: 8px; display: none; }

        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-weight: 800; font-size: 0.95rem; cursor: pointer; transition: 0.2s; }
        .modal-btn-primary { background: var(--danger); color: white; }
        .modal-btn-primary:hover { background: #dc2626; box-shadow: 0 4px 15px rgba(220,38,38,0.3); }
        .modal-btn-secondary { background: #e2e8f0; color: #475569; }
        .modal-btn-secondary:hover { background: #cbd5e1; }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div class="dashboard-container">
        <div class="logo-box"><i class='bx bx-broadcast'></i></div>
        <h1>Broadcast Live</h1>
        <p class="subtitle">CampusTransit GPS Terminal</p>

        <div class="status-box">
            <div class="status-badge">
                <div class="pulse-dot"></div>
                Live Transmission Active
            </div>
            
            <div style="margin-bottom: 20px;">
                <p class="coord-label">Session Identity</p>
                <p style="font-weight: 700; color: var(--text-dark);">Authorized Fleet Pilot</p>
            </div>

            <div>
                <p class="coord-label">Current Geo-Coordinates</p>
                <div class="coords" id="lat-long-display">Locking onto Satellites...</div>
            </div>
        </div>

        <button onclick="window.location.href='/driver/logout'" class="btn-stop">
            Terminate Session <i class='bx bx-power-off'></i>
        </button>

        <div class="footer-nav">
            <a href="/"><i class='bx bx-map-pin'></i> Global Map</a>
            <a href="/driver"><i class='bx bx-user-circle'></i> Profile</a>
        </div>
    </div>

    <!-- Trip Complete Banner -->
    <div class="trip-complete-banner" id="trip-complete-banner">
        <i class='bx bxs-flag-checkered' style="font-size: 24px;"></i>
        <div>
            <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;">Destination Reached</div>
            <div style="font-size: 1.1rem;">College Campus Arrived!</div>
        </div>
    </div>

    <!-- SOS FAB -->
    <button class="sos-fab" onclick="openSOSModal()" title="Report Issue">🚨</button>

    <!-- SOS Modal -->
    <div class="modal-overlay" id="sosModal">
        <div class="modal-card">
            <div class="modal-title">🚨 Report Bus Issue</div>
            <p class="modal-sub">Alert the admin and update your active status.</p>

            <div class="modal-field">
                <label>Problem Category</label>
                <select id="sos-problem-type">
                    <option value="" disabled selected>Select the issue...</option>
                    <option value="Breakdown">⚙️ Bus Breakdown</option>
                    <option value="Accident">💥 Accident / Crash</option>
                    <option value="Road Block">🚧 Road Block / Traffic</option>
                    <option value="Medical Emergency">🩺 Medical Emergency</option>
                    <option value="Delayed">⏰ Significantly Delayed</option>
                    <option value="Other">❓ Other</option>
                </select>
            </div>

            <div class="modal-field">
                <label>Description (Optional)</label>
                <textarea id="sos-description" placeholder="Briefly describe the situation..." rows="3"></textarea>
            </div>

            <div class="modal-field">
                <label>Voice Note (Max 60s)</label>
                <div class="recorder-box">
                    <div class="recorder-waveform" id="recorder-waveform">
                        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
                    </div>
                    <div class="recorder-timer" id="recorder-timer">0:00</div>
                    <div class="recorder-controls">
                        <button class="rec-btn rec-btn-start" id="rec-start-btn" onclick="startRecording()">
                            <i class='bx bx-microphone'></i> Record
                        </button>
                        <button class="rec-btn rec-btn-stop" id="rec-stop-btn" onclick="stopRecording()">
                            <i class='bx bx-stop'></i> Stop
                        </button>
                    </div>
                    <audio class="preview" id="audio-preview" controls></audio>
                </div>
            </div>

            <div id="sos-error" style="color:var(--danger);font-size:0.85rem;display:none;margin-top:-5px;text-align:center;font-weight:700;"></div>

            <div class="modal-actions">
                <button class="modal-btn modal-btn-primary" id="sos-submit-btn" onclick="submitSOS()">
                    🚨 Send Alert
                </button>
                <button class="modal-btn modal-btn-secondary" onclick="closeSOSModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="/static/js/driver_dashboard.js"></script>
    <script>
        // BACKGROUND PARTICLES
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];
        const mouse = { x: null, y: null, radius: 200 };
        const icons = ['📡', '🛰️', '🗺️', '📍', '📶', '🚀'];

        window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });

        class Particle {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 15 + 10;
                this.speed = Math.random() * 0.4 + 0.1;
                this.icon = icons[Math.floor(Math.random() * icons.length)];
                this.opacity = Math.random() * 0.3 + 0.1;
            }
            update() {
                this.y -= this.speed;
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < mouse.radius) {
                    let force = (mouse.radius - distance) / mouse.radius;
                    this.x -= (dx / distance) * force * 8;
                    this.y -= (dy / distance) * force * 8;
                }
                if (this.y < -30) this.y = canvas.height + 30;
                this.draw();
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.font = `${this.size}px Arial`;
                ctx.fillText(this.icon, this.x, this.y);
            }
        }

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particlesArray = [];
            for (let i = 0; i < 60; i++) { particlesArray.push(new Particle()); }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particlesArray.forEach(p => p.update());
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', init);
        init(); animate();
    </script>
</body>
</html>
