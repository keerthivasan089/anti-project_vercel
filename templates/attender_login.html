<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Campus Ride - Attender Portal</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --accent: #a78bfa;
            --bg-light: #f5f3ff;
            --text-dark: #1a202c;
            --glass: rgba(255, 255, 255, 0.65);
            --danger: #ef4444;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            overflow-x: hidden; overflow-y: auto;
            margin: 0;
        }

        #bgCanvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
            background: radial-gradient(circle at center, #ffffff 0%, #ede9fe 100%);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 45px 40px;
            background-color: var(--glass);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 32px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05), 0 20px 50px rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            text-align: center;
            position: relative;
            z-index: 999;
        }

        .logo-box {
            width: 68px; height: 68px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 34px; color: #ffffff;
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
        }

        h1 { font-size: 28px; font-weight: 800; color: var(--text-dark); margin-bottom: 6px; letter-spacing: -1px; }
        .subtitle { font-size: 14px; color: #4a5568; margin-bottom: 35px; font-weight: 600; }

        form { display: flex; flex-direction: column; gap: 20px; text-align: left; }

        .input-group label {
            display: block; font-size: 11px; font-weight: 800;
            color: var(--primary); text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 8px; margin-left: 4px;
        }

        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i { position: absolute; left: 16px; font-size: 20px; color: var(--primary); }

        .input-wrapper input, .input-wrapper select {
            width: 100%;
            padding: 15px 15px 15px 50px;
            background-color: rgba(255, 255, 255, 0.7);
            border: 1.5px solid rgba(139, 92, 246, 0.1);
            border-radius: 16px;
            outline: none; font-size: 14px; font-weight: 600;
            color: var(--text-dark); transition: 0.3s; appearance: none;
        }

        .input-wrapper input:focus, .input-wrapper select:focus {
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }

        .submit-btn {
            width: 100%; padding: 16px;
            background: var(--primary);
            border: none; border-radius: 16px; color: #fff; font-weight: 700;
            cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px;
            box-shadow: 0 4px 0 var(--primary-dark);
            transition: all 0.1s; margin-top: 10px; font-size: 15px;
        }

        .submit-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--primary-dark); }
        .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; }

        .footer-link { margin-top: 30px; font-size: 13px; color: #4a5568; font-weight: 600; }
        .footer-link a { color: var(--primary); text-decoration: none; font-weight: 800; }

        #login-error { color: var(--danger); font-size: 13px; margin-top: 15px; font-weight: 600; display: none; }
        #login-success { color: var(--success); font-size: 13px; margin-top: 15px; font-weight: 600; display: none; }

        .input-wrapper::after {
            content: '\ebad';
            font-family: 'boxicons';
            position: absolute; right: 16px;
            color: var(--primary); pointer-events: none;
        }
        .input-wrapper.no-arrow::after { display: none; }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div class="login-container">
        <div class="logo-box"><i class='bx bxs-user-check'></i></div>
        <h1>Attender Login</h1>
        <p class="subtitle">Bus Attendance Management</p>

        <form id="login-form" onsubmit="return false;">
            <div class="input-group">
                <label>Assigned Bus</label>
                <div class="input-wrapper">
                    <i class='bx bx-bus'></i>
                    <select id="bus-select" required>
                        <option value="" disabled selected>Choose your bus...</option>
                        {% for bus in buses %}
                        <option value="{{ bus.id }}">{{ bus.busnumber }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="input-group">
                <label>Phone Number</label>
                <div class="input-wrapper no-arrow">
                    <i class='bx bx-phone'></i>
                    <input type="tel" id="phone-input" placeholder="Enter your 10-digit phone" required maxlength="10">
                </div>
            </div>

            <button type="button" class="submit-btn" onclick="loginAttender()">
                Sign In <i class='bx bx-log-in'></i>
            </button>
            <div id="login-error"></div>
            <div id="login-success"></div>
        </form>
        <div class="footer-link"><a href="/index"><i class='bx bx-home-alt'></i> Return to Home</a></div>
    </div>

    <script>
        async function loginAttender() {
            const busId = document.getElementById('bus-select').value;
            const phone = document.getElementById('phone-input').value.trim();
            const errorDiv = document.getElementById('login-error');
            const successDiv = document.getElementById('login-success');
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (!busId || phone.length !== 10) {
                errorDiv.innerText = "Please select a bus and enter a valid 10-digit phone number.";
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('/api/attender/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bus_id: busId, phone: phone })
                });
                const data = await res.json();

                if (data.success) {
                    successDiv.innerText = "Login successful! Redirecting...";
                    successDiv.style.display = 'block';
                    setTimeout(() => { window.location.href = '/attender/dashboard'; }, 800);
                } else {
                    errorDiv.innerText = data.message || "Invalid credentials";
                    errorDiv.style.display = 'block';
                }
            } catch (e) {
                errorDiv.innerText = "Network error. Please try again.";
                errorDiv.style.display = 'block';
            }
        }
    </script>

    <!-- Background Particles -->
    <script>
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];
        const mouse = { x: null, y: null, radius: 180 };
        const icons = ['📋', '✅', '👤', '🚌', '📝', '🎓', '📊', '✏️'];

        window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });

        class Particle {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 12 + 10;
                this.speed = Math.random() * 2.5 + 1.2;
                this.isVertical = Math.random() > 0.5;
                this.direction = Math.random() > 0.5 ? 1 : -1;
                this.icon = icons[Math.floor(Math.random() * icons.length)];
                this.opacity = Math.random() * 0.4 + 0.1;
            }
            update() {
                if (this.isVertical) this.y += this.speed * this.direction;
                else this.x += this.speed * this.direction;
                if (mouse.x !== null) {
                    let dx = mouse.x - this.x, dy = mouse.y - this.y;
                    let dist2 = dx * dx + dy * dy, r2 = mouse.radius * mouse.radius;
                    if (dist2 < r2) {
                        let dist = Math.sqrt(dist2), force = (mouse.radius - dist) / mouse.radius;
                        this.x -= (dx / dist) * force * 50;
                        this.y -= (dy / dist) * force * 50;
                    }
                }
                if (Math.random() < 0.004) this.isVertical = !this.isVertical;
                if (this.x < -40) this.x = canvas.width + 40;
                if (this.x > canvas.width + 40) this.x = -40;
                if (this.y < -40) this.y = canvas.height + 40;
                if (this.y > canvas.height + 40) this.y = -40;
                this.draw();
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.font = `${this.size}px Arial`;
                ctx.fillText(this.icon, this.x, this.y);
            }
        }

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particlesArray = [];
            for (let i = 0; i < 70; i++) particlesArray.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particlesArray.forEach(p => p.update());
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', init);
        init(); animate();
    </script>
</body>
</html>
